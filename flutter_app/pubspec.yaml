name: yaamaan
description: Yaamaan Global B2B Marketplace - Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.2.0

  # Authentication
  google_sign_in: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Image handling
  cached_network_image: ^3.3.1

  # UI Components
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  smooth_page_indicator: ^1.1.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.2

  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
